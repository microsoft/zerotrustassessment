name: Release PowerShell Module

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest

    env:
      MODULE_NAME: ZeroTrustAssessment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Package module
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $eventName = '${{ github.event_name }}'
          $tag = switch ($eventName) {
            'workflow_dispatch' { '${{ inputs.tag }}'; break }
            default { '${{ github.ref_name }}' }
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must match v<major>.<minor>.<patch>, for example v0.1.0. Received: $tag"
          }

          $version = $tag.TrimStart('v')
          $moduleName = $env:MODULE_NAME
          $releaseDirectory = Join-Path $PWD 'build/release'
          $moduleDirectory = Join-Path (Join-Path $releaseDirectory $moduleName) $version
          $artifactDirectory = Join-Path $PWD 'artifacts'
          $zipPath = Join-Path $artifactDirectory "$moduleName-$tag.zip"

          Remove-Item -Path $releaseDirectory, $artifactDirectory -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path $artifactDirectory -ItemType Directory -Force | Out-Null

          & .\build\powershell\Install-Prerequisites.ps1
          & .\build\powershell\Build-PSModule.ps1 `
            -BaseDirectory $PWD `
            -OutputDirectory $releaseDirectory `
            -ReleaseVersion $version `
            -ProductionBuild

          if (!(Test-Path -Path $moduleDirectory -PathType Container)) {
            throw "Expected build output directory was not found: $moduleDirectory"
          }

          Compress-Archive -Path $moduleDirectory -DestinationPath $zipPath -Force

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_name=$(Split-Path -Path $zipPath -Leaf)" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = '${{ steps.package.outputs.tag }}'
          $zipPath = '${{ steps.package.outputs.zip_path }}'

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Release $tag" --verify-tag
          }

          gh release upload $tag $zipPath --clobber
